<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sàpio — a feed to get smarter</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#22245C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,900;1,9..144,500&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F5EFE3;--paper-dim:rgba(245,239,227,.62);--paper-faint:rgba(245,239,227,.20);
    --books-bg:#22245C;--books-acc:#F2B705;--science-bg:#0C5449;--science-acc:#6FE3C4;
    --history-bg:#5E1F2E;--history-acc:#E8A15C;--geography-bg:#2F4A2E;--geography-acc:#CFE06A;
    --cinema-bg:#2E2350;--cinema-acc:#C9A6FF;--people-bg:#4A2036;--people-acc:#F2A6C2;
    --food-bg:#6B3416;--food-acc:#F2C066;--howitsmade-bg:#24384A;--howitsmade-acc:#8FC2E0;
    --news-bg:#2A2E33;--news-acc:#E8D6A0;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{background:radial-gradient(120% 90% at 50% 0%,#1c1c22 0%,#0c0c0f 70%);
    font-family:'Inter',system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100dvh;color:var(--paper)}
  .device{position:relative;width:100%;max-width:452px;height:100dvh;max-height:940px;overflow:hidden;background:#000;
    border-radius:34px;box-shadow:0 30px 80px -20px rgba(0,0,0,.8),0 0 0 1px rgba(255,255,255,.04)}
  @media (max-width:480px){.device{max-height:none;border-radius:0;box-shadow:none}body{background:#000}}

  .top{position:absolute;top:0;left:0;right:0;z-index:20;padding:14px 16px 22px;
    background:linear-gradient(180deg,rgba(0,0,0,.6),rgba(0,0,0,0));pointer-events:none}
  .brand{display:flex;align-items:center;justify-content:space-between;pointer-events:auto}
  .brandleft{display:flex;align-items:baseline;gap:9px}
  .brand h1{font-family:'Fraunces',serif;font-weight:900;font-size:23px;letter-spacing:-.5px;line-height:1}
  .brand .tag{font-family:'Space Mono',monospace;font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--paper-dim)}
  .savedbtn{display:flex;align-items:center;gap:6px;font-family:'Space Mono',monospace;font-size:11px;color:var(--paper);
    background:rgba(0,0,0,.3);border:1px solid var(--paper-faint);border-radius:100px;padding:6px 11px;cursor:pointer;
    backdrop-filter:blur(6px);transition:.15s}
  .savedbtn svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:1.8}
  .savedbtn.on{background:var(--paper);color:#111;border-color:var(--paper)}
  .savedbtn.on svg{fill:#111;stroke:#111}
  .savedbtn .badge{font-weight:700}
  .filters{display:flex;gap:7px;margin-top:13px;overflow-x:auto;scrollbar-width:none;pointer-events:auto}
  .filters::-webkit-scrollbar{display:none}
  .device.saved-mode .filters{display:none}
  .pill{flex:0 0 auto;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.5px;padding:6px 13px;
    border-radius:100px;border:1px solid var(--paper-faint);background:rgba(0,0,0,.3);color:var(--paper-dim);
    cursor:pointer;backdrop-filter:blur(6px);transition:.18s}
  .pill:hover{color:var(--paper)}
  .pill.on{background:var(--paper);color:#111;border-color:var(--paper);font-weight:700}

  .feed{height:100%;overflow-y:scroll;scroll-snap-type:y mandatory;scroll-behavior:smooth;scrollbar-width:none}
  .feed::-webkit-scrollbar{display:none}

  .card{position:relative;height:100%;scroll-snap-align:start;scroll-snap-stop:always;
    padding:96px 26px 30px;display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
  .card.hide{display:none}
  .card .ghost{position:absolute;right:-14px;bottom:34px;font-family:'Fraunces',serif;font-weight:900;
    font-size:150px;line-height:.8;color:#fff;opacity:.045;pointer-events:none;user-select:none;letter-spacing:-4px}
  .card .bgimg{position:absolute;inset:0;z-index:0;background-size:cover;background-position:center;opacity:.30;filter:saturate(.9)}
  .card.has-img::after{content:'';position:absolute;inset:0;z-index:1;
    background:linear-gradient(180deg,var(--bg) 0%,rgba(0,0,0,0) 30%,rgba(0,0,0,.06) 52%,var(--bg) 90%)}
  .card.has-img .ghost{display:none}

  .eyebrow{position:relative;z-index:3;display:flex;align-items:center;gap:10px;font-family:'Space Mono',monospace;
    font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--acc)}
  .eyebrow .dot{width:7px;height:7px;border-radius:50%;background:var(--acc)}
  .eyebrow .count{margin-left:auto;color:var(--paper-dim);letter-spacing:1px}

  .stack{position:relative;z-index:3;margin-top:auto}
  .opener{font-family:'Fraunces',serif;font-style:italic;font-weight:500;font-size:16px;line-height:1.3;
    color:var(--acc);margin-bottom:12px;max-width:32ch}
  .hook{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(29px,7vw,38px);line-height:1.05;
    letter-spacing:-.6px;text-wrap:balance}
  .body{font-size:15.5px;line-height:1.5;color:var(--paper-dim);margin-top:16px;max-width:34ch}
  .more{display:inline-block;margin-top:16px;font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.3px;
    color:var(--acc);text-decoration:none;border-bottom:1px solid currentColor;padding-bottom:2px;position:relative;z-index:3}
  .more:hover{opacity:.8}

  .card.empty{align-items:center;justify-content:center;text-align:center;background:#17171d}
  .card.empty .stack{margin:0;max-width:28ch}
  .card.empty .hook{color:var(--paper)}
  .card.empty .body{margin-left:auto;margin-right:auto}

  .foot{position:relative;z-index:3;margin-top:22px;display:flex;align-items:flex-end;gap:14px}
  .source{flex:1;font-family:'Space Mono',monospace;font-size:11px;line-height:1.45;color:var(--paper-dim)}
  .source b{color:var(--paper);font-weight:700;letter-spacing:.5px}

  .actions{display:flex;flex-direction:column;gap:14px;align-items:center}
  .act{background:none;border:none;color:var(--paper);cursor:pointer;display:flex;flex-direction:column;
    align-items:center;gap:3px;font-family:'Space Mono',monospace;font-size:10px;opacity:.85;transition:.15s}
  .act:hover{opacity:1}
  .act svg{width:26px;height:26px;stroke:currentColor;stroke-width:1.8;fill:none;transition:.15s}
  .act.on{color:var(--acc)}.act.on svg{fill:var(--acc);stroke:var(--acc)}

  .card.video{padding:96px 20px 26px}
  .card.video .vid{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;background:#000}
  .card.video::after{content:'';position:absolute;inset:0;z-index:1;
    background:linear-gradient(180deg,rgba(0,0,0,.55) 0%,rgba(0,0,0,.05) 24%,rgba(0,0,0,.12) 50%,rgba(0,0,0,.9) 100%)}
  .playglyph{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:3;width:70px;height:70px;
    border-radius:50%;border:1.5px solid rgba(245,239,227,.85);background:rgba(0,0,0,.28);display:flex;align-items:center;
    justify-content:center;opacity:0;transition:opacity .2s;pointer-events:none}
  .card.video.paused .playglyph{opacity:1}
  .playglyph svg{width:24px;height:24px;fill:var(--paper);margin-left:3px}
  .mutebtn{position:absolute;top:98px;right:18px;z-index:15;width:42px;height:42px;border-radius:50%;
    border:1px solid rgba(245,239,227,.3);background:rgba(0,0,0,.35);backdrop-filter:blur(6px);color:var(--paper);
    cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
  .mutebtn:hover{background:rgba(0,0,0,.55)}
  .mutebtn svg{width:20px;height:20px;fill:currentColor}
  .vmeta{position:relative;z-index:3;margin-top:auto}
  .vmeta .ttl{font-family:'Fraunces',serif;font-weight:600;font-size:clamp(24px,6vw,30px);line-height:1.08;letter-spacing:-.4px}
  .vmeta .chan{margin-top:8px;font-family:'Space Mono',monospace;font-size:12px;color:var(--paper);display:inline-flex;align-items:center;gap:7px}
  .vmeta .chan .lc{background:var(--acc);color:#111;font-weight:700;padding:1px 6px;border-radius:4px;font-size:10px;letter-spacing:.5px}

  .install{position:absolute;bottom:16px;left:16px;right:16px;z-index:30;display:flex;align-items:center;gap:11px;
    padding:11px 14px;border-radius:16px;background:rgba(255,255,255,.09);backdrop-filter:blur(14px);
    border:1px solid rgba(255,255,255,.12);font-size:12.5px;line-height:1.35;transition:.3s}
  .install.gone{opacity:0;transform:translateY(16px);pointer-events:none}
  .install svg{width:20px;height:20px;flex:0 0 auto;stroke:var(--paper);stroke-width:1.7;fill:none}
  .install b{font-weight:600}.install .x{margin-left:auto;cursor:pointer;color:var(--paper-dim);font-size:18px;padding:2px 4px}

  .swipe{position:absolute;bottom:78px;left:50%;transform:translateX(-50%);z-index:25;font-family:'Space Mono',monospace;
    font-size:10px;letter-spacing:1.5px;color:var(--paper-dim);text-transform:uppercase;display:flex;flex-direction:column;
    align-items:center;gap:4px;animation:bob 1.6s ease-in-out infinite;transition:opacity .4s}
  .swipe.gone{opacity:0}
  @keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(6px)}}
</style>
</head>
<body>
<div class="device" id="device">
  <div class="top">
    <div class="brand">
      <div class="brandleft"><h1>Sàpio</h1><span class="tag">no brainrot</span></div>
      <button class="savedbtn" id="savedBtn" aria-label="saved">
        <svg viewBox="0 0 24 24"><path d="M6 4h12v16l-6-4-6 4z"/></svg><span class="badge" id="savedCount">0</span>
      </button>
    </div>
    <div class="filters" id="filters">
      <button class="pill on" data-cat="all">all</button>
      <button class="pill" data-cat="cinema">cinema</button>
      <button class="pill" data-cat="people">people</button>
      <button class="pill" data-cat="books">books</button>
      <button class="pill" data-cat="history">history</button>
      <button class="pill" data-cat="geography">geography</button>
      <button class="pill" data-cat="science">science</button>
      <button class="pill" data-cat="food">food</button>
      <button class="pill" data-cat="howitsmade">how it's made</button>
      <button class="pill" data-cat="news">news</button>
    </div>
  </div>
  <div class="feed" id="feed"></div>
  <div class="swipe" id="swipe"><span>scroll</span><span>&#8964;</span></div>
  <div class="install" id="install">
    <svg viewBox="0 0 24 24"><path d="M12 3v12m0 0l-4-4m4 4l4-4M5 21h14"/></svg>
    <span><b>Put it on your phone:</b> Share &rarr; &ldquo;Add to Home Screen.&rdquo;</span>
    <span class="x" id="closeInstall">&times;</span>
  </div>
</div>

<script>
const LABEL={cinema:'Cinema',people:'People',books:'Books',history:'History',geography:'Geography',science:'Science',food:'Food',howitsmade:"How it's made",news:'News'};
const GHOST={cinema:'C',people:'P',books:'B',history:'H',geography:'G',science:'S',food:'F',howitsmade:'M',news:'N'};
const WIKI_BASE='https://en.wikipedia.org/wiki/';

const SAMPLE=[
  {type:'card',cat:'cinema',wiki:'Wilhelm scream',url:WIKI_BASE+'Wilhelm_scream',opener:'Once you hear it, you hear it everywhere —',hook:'The same recorded scream has been reused in hundreds of films.',body:'Recorded in 1951, the &ldquo;Wilhelm scream&rdquo; became a sound-editor in-joke and turns up in Star Wars, Indiana Jones, Pixar movies and more. Sound crews slip it in on purpose.',src:'Film sound'},
  {type:'card',cat:'people',wiki:'Hedy Lamarr',url:WIKI_BASE+'Hedy_Lamarr',opener:'The 1940s movie star who helped invent your Wi-Fi —',hook:'A Hollywood actress co-invented the technology behind Wi-Fi and Bluetooth.',body:'Between films, Hedy Lamarr co-designed a &ldquo;frequency-hopping&rdquo; system to stop torpedoes being jammed. The same idea underpins modern wireless.',src:'History of technology'},
  {type:'video',cat:'science',src_url:'https://commons.wikimedia.org/wiki/Special:FilePath/Active_Sun_in_3-D.webm',ttl:'The Sun, churning in three dimensions',chan:'NASA · public domain',src:'PD NASA · Wikimedia',url:'https://commons.wikimedia.org/wiki/File:Active_Sun_in_3-D.webm'},
  {type:'card',cat:'food',wiki:'Honey',url:WIKI_BASE+'Honey',opener:'Basically immortal breakfast —',hook:'Honey never really spoils — jars found in ancient Egyptian tombs were still edible.',body:'Its low water content and natural acidity make it a terrible home for bacteria. Sealed properly, it can last thousands of years.',src:'Food science'},
  {type:'card',cat:'howitsmade',wiki:'Pencil',url:WIKI_BASE+'Pencil',opener:'A tiny lie you were told in school —',hook:'Pencil &ldquo;lead&rdquo; has never contained any lead at all.',body:'It&rsquo;s graphite mixed with clay. The name stuck from a 16th-century mix-up, when people thought the newly found graphite was a form of lead.',src:'Manufacturing'},
  {type:'card',cat:'geography',wiki:'Point Nemo',url:WIKI_BASE+'Point_Nemo',opener:'The loneliest spot on Earth —',hook:'At Point Nemo, the nearest humans are often astronauts passing overhead.',body:'This point in the Pacific is so far from any land (~2,700 km) that when the ISS flies over, its crew is closer than anyone on the surface.',src:'Geography'},
  {type:'card',cat:'history',wiki:'Great Molasses Flood',url:WIKI_BASE+'Great_Molasses_Flood',opener:'History&rsquo;s stickiest disaster —',hook:'In 1919 a wave of molasses flooded a Boston neighbourhood and killed 21 people.',body:'A giant storage tank burst, sending a sticky wall moving fast enough to wreck buildings. Locals said the area smelled of molasses for decades.',src:'Wikipedia'},
  {type:'video',cat:'geography',src_url:'https://commons.wikimedia.org/wiki/Special:FilePath/Animation_of_Rotating_Earth_at_Night.webm',ttl:'Earth at night, every city glowing',chan:'NASA · public domain',src:'PD NASA · Wikimedia',url:'https://commons.wikimedia.org/wiki/File:Animation_of_Rotating_Earth_at_Night.webm'},
  {type:'card',cat:'people',wiki:'Christopher Lee',url:WIKI_BASE+'Christopher_Lee',opener:'The most metal actor who ever lived —',hook:'Dracula actor Christopher Lee released heavy-metal albums in his late 80s and 90s.',body:'He served in WWII special operations, spoke several languages, and recorded symphonic-metal records about Charlemagne. Few careers are this strange.',src:'Wikipedia'},
  {type:'card',cat:'science',wiki:'Tardigrade',url:WIKI_BASE+'Tardigrade',opener:'File under &ldquo;basically indestructible&rdquo; —',hook:'Tardigrades can survive the vacuum of open space.',body:'These half-millimetre &ldquo;water bears&rdquo; shrug off boiling, freezing and radiation by drying into a tun. Some rode outside a spacecraft and lived.',src:'Extremophile biology'},
  {type:'card',cat:'cinema',wiki:'A113',url:WIKI_BASE+'A113',opener:'A hidden signature in your favourite cartoons —',hook:'The code &ldquo;A113&rdquo; is tucked into almost every Pixar film.',body:'It&rsquo;s the number of a classroom at the animation school many Pixar artists attended. They hide it in license plates, door numbers and signs as a wink.',src:'Animation'},
  {type:'card',cat:'food',wiki:'Carrot',url:WIKI_BASE+'Carrot',opener:'Orange is the plot twist —',hook:'Carrots were mostly purple and white before they were orange.',body:'The familiar orange carrot was cultivated later, likely in the Netherlands. Older varieties came in purple, yellow and white.',src:'Wikipedia'},
  {type:'card',cat:'howitsmade',wiki:'Bubble wrap',url:WIKI_BASE+'Bubble_wrap',opener:'Invented for the wrong job —',hook:'Bubble wrap was first sold as textured wallpaper.',body:'When that flopped, its makers pitched it as greenhouse insulation, then finally as packaging. The satisfying pop was never the plan.',src:'Manufacturing'},
  {type:'card',cat:'books',wiki:'Fahrenheit 451',url:WIKI_BASE+'Fahrenheit_451',opener:'A book about books, written among them —',hook:'Ray Bradbury wrote Fahrenheit 451 on a coin-operated typewriter in a library basement.',body:'He rented the machine for ten cents per half hour and finished the draft for a few dollars — a book about burning books, born in a library.',src:'Wikipedia'},
  {type:'card',cat:'news',opener:'News —',hook:'Fresh film &amp; book news lands here once it&rsquo;s live.',body:'When deployed, this pulls the latest from The Guardian (Film &amp; Books), Cineuropa and BBC Culture — mostly films and books, with a spoiler filter, plus a little science. Title, a few lines, and a link to read on.',src:'Guardian · Cineuropa · BBC'},
];

const feed=document.getElementById('feed'), device=document.getElementById('device');
const ICON_ON='<svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3a4.5 4.5 0 00-2.5-4v8a4.5 4.5 0 002.5-4zM14 3.2v2.1a7 7 0 010 13.4v2.1a9 9 0 000-17.6z"/></svg>';
const ICON_OFF='<svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3z"/><path d="M16 8l5 5m0-5l-5 5" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>';
const HEART='<path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>';
const BOOKMARK='<path d="M6 4h12v16l-6-4-6 4z"/>';
let soundOn=false;

let mem=[];
const store={
  all(){ try{ return JSON.parse(localStorage.getItem('sapio_saved')||'[]'); }catch(e){ return mem; } },
  set(a){ mem=a; try{ localStorage.setItem('sapio_saved',JSON.stringify(a)); }catch(e){} }
};
function hash(s){let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))|0;return 'i'+(h>>>0).toString(36);}
function itemId(it){return hash(it.type==='video'?('v'+(it.src_url||it.ttl||'')):('c'+(it.hook||'')+(it.src||'')));}
function isSaved(id){return store.all().some(x=>x._id===id);}
function toggleSave(it){const id=itemId(it),a=store.all(),i=a.findIndex(x=>x._id===id);
  if(i>=0)a.splice(i,1);else a.unshift({...it,_id:id}); store.set(a); return i<0;}
function updateBadge(){document.getElementById('savedCount').textContent=store.all().length;}

let renderMap={};
function actionsHTML(saved){return `
  <div class="actions">
    <button class="act like" aria-label="like"><svg viewBox="0 0 24 24">${HEART}</svg><span>like</span></button>
    <button class="act save ${saved?'on':''}" aria-label="save"><svg viewBox="0 0 24 24">${BOOKMARK}</svg><span>save</span></button>
  </div>`;}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function render(list){
  const total=list.length; feed.innerHTML=''; renderMap={};
  if(!total){ feed.innerHTML=`<article class="card empty"><div class="stack"><h2 class="hook">Nothing saved yet</h2><p class="body">Tap <b>Save</b> on any card and it&rsquo;ll wait for you here — stored right on this device.</p></div></article>`; setupObserver(); return; }
  list.forEach((it,i)=>{
    const id=itemId(it); renderMap[id]=it;
    const el=document.createElement('article');
    el.dataset.cat=it.cat; el.dataset.id=id;
    el.style.setProperty('--bg',`var(--${it.cat}-bg)`);
    el.style.setProperty('--acc',`var(--${it.cat}-acc)`);
    const count=`${String(i+1).padStart(2,'0')} / ${String(total).padStart(2,'0')}`;
    const eyebrow=`<div class="eyebrow"><span class="dot"></span>${LABEL[it.cat]||it.cat}<span class="count">${count}</span></div>`;
    const saved=isSaved(id);
    const more=it.url?`<a class="more" href="${it.url}" target="_blank" rel="noopener">Read more →</a>`:'';
    if(it.type==='card'){
      const bg=it.img?`<div class="bgimg" style="background-image:url(${it.img})"></div>`:'';
      el.className='card'+(it.img?' has-img':'');
      if(it.wiki&&!it.img) el.dataset.wiki=it.wiki;
      el.innerHTML=`${bg}<div class="ghost">${GHOST[it.cat]||''}</div>${eyebrow}
        <div class="stack">${it.opener?`<p class="opener">${it.opener}</p>`:''}<h2 class="hook">${it.hook}</h2>${it.body?`<p class="body">${it.body}</p>`:''}${more}</div>
        <div class="foot"><div class="source"><b>Source</b> · ${it.src}</div>${actionsHTML(saved)}</div>`;
    } else {
      el.className='card video paused';
      el.innerHTML=`<video class="vid" src="${it.src_url}" ${it.poster?`poster="${it.poster}"`:''} loop muted playsinline preload="none"></video>${eyebrow}
        <button class="mutebtn" aria-label="sound">${soundOn?ICON_ON:ICON_OFF}</button>
        <div class="playglyph"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
        <div class="vmeta"><div class="ttl">${it.ttl}</div><div class="chan"><span class="lc">CLIP</span>${it.chan||'Wikimedia'}</div>${more}</div>
        <div class="foot"><div class="source"><b>Source</b> · ${it.src}</div>${actionsHTML(saved)}</div>`;
      const v=el.querySelector('video');
      v.addEventListener('play',()=>el.classList.remove('paused'));
      v.addEventListener('pause',()=>el.classList.add('paused'));
    }
    feed.appendChild(el);
  });
  setupObserver(); enrichImages();
}

function enrichImages(){
  document.querySelectorAll('.card[data-wiki]:not(.has-img)').forEach(el=>{
    fetch('https://en.wikipedia.org/api/rest_v1/page/summary/'+encodeURIComponent(el.dataset.wiki))
      .then(r=>r.ok?r.json():null).then(d=>{
        const src=d&&((d.thumbnail&&d.thumbnail.source)||(d.originalimage&&d.originalimage.source));
        if(!src)return;
        const bg=document.createElement('div'); bg.className='bgimg'; bg.style.backgroundImage=`url(${src})`;
        el.insertBefore(bg,el.firstChild); el.classList.add('has-img');
      }).catch(()=>{});
  });
}

function applySound(){document.querySelectorAll('.card video').forEach(v=>v.muted=!soundOn);
  document.querySelectorAll('.mutebtn').forEach(b=>b.innerHTML=soundOn?ICON_ON:ICON_OFF);}

feed.addEventListener('click',e=>{
  const mb=e.target.closest('.mutebtn');
  if(mb){soundOn=!soundOn;applySound();const v=mb.closest('.card.video').querySelector('video');if(v){v.muted=!soundOn;v.play().catch(()=>{});}return;}
  const sv=e.target.closest('.act.save');
  if(sv){const card=sv.closest('.card');const id=card.dataset.id;const it=renderMap[id]||store.all().find(x=>x._id===id);if(!it)return;
    const now=toggleSave(it);
    document.querySelectorAll('.card[data-id="'+id+'"] .act.save').forEach(b=>b.classList.toggle('on',now));
    updateBadge(); if(savedMode) renderSaved(); return;}
  if(e.target.closest('.more')) return;
  const vid=e.target.closest('.vid');
  if(vid){vid.paused?vid.play().catch(()=>{}):vid.pause();return;}
  const act=e.target.closest('.act.like'); if(act) act.classList.toggle('on');
});

let io;
function setupObserver(){
  if(io)io.disconnect();
  io=new IntersectionObserver(entries=>{entries.forEach(en=>{
    const v=en.target.querySelector('video'); if(!v)return;
    if(en.isIntersecting&&en.intersectionRatio>=0.6){v.muted=!soundOn;v.play().catch(()=>{});}else{v.pause();}
  });},{root:feed,threshold:[0,0.6,1]});
  document.querySelectorAll('.card.video').forEach(c=>io.observe(c));
}

let mainItems=[], activeCat='all', savedMode=false;
function applyFilter(cat){activeCat=cat;
  document.querySelectorAll('.card').forEach(c=>c.classList.toggle('hide',cat!=='all'&&c.dataset.cat!==cat));}
function renderFeed(){render(mainItems);applyFilter(activeCat);}
function renderSaved(){render(store.all());}

document.getElementById('savedBtn').addEventListener('click',()=>{
  savedMode=!savedMode; device.classList.toggle('saved-mode',savedMode);
  document.getElementById('savedBtn').classList.toggle('on',savedMode);
  feed.scrollTo({top:0}); savedMode?renderSaved():renderFeed();
});
document.getElementById('filters').addEventListener('click',e=>{
  const p=e.target.closest('.pill'); if(!p)return;
  document.querySelectorAll('.pill').forEach(x=>x.classList.remove('on'));
  p.classList.add('on'); feed.scrollTo({top:0}); applyFilter(p.dataset.cat);
});

const swipe=document.getElementById('swipe');
feed.addEventListener('scroll',()=>{if(feed.scrollTop>40)swipe.classList.add('gone');},{passive:true});
document.getElementById('closeInstall').addEventListener('click',()=>document.getElementById('install').classList.add('gone'));
setTimeout(()=>document.getElementById('install').classList.add('gone'),9000);

let lastGenerated=null;
async function loadContent(initial){
  try{
    const res=await fetch('content.json',{cache:'no-store'});
    if(res.ok){
      const d=await res.json();
      if(d.items&&d.items.length){
        if(d.generated&&d.generated===lastGenerated) return false;
        lastGenerated=d.generated||String(Date.now());
        mainItems=shuffle(d.items.slice());
        return true;
      }
    }
  }catch(e){}
  if(initial){ mainItems=shuffle(SAMPLE.slice()); return true; }
  return false;
}
async function refresh(){
  if(savedMode) return;
  const changed=await loadContent(false);
  if(changed && feed.scrollTop<60) renderFeed();
}
document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='visible') refresh(); });
setInterval(refresh, 15*60*1000);

(async()=>{ await loadContent(true); updateBadge(); renderFeed(); })();
</script>
