name: Update content

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours (UTC)
  workflow_dispatch:          # lets you run it by hand from the Actions tab

permissions:
  contents: write             # allows the job to commit content.json

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch fresh content
        # To turn on LLM humanizing, uncomment env and add ANTHROPIC_API_KEY
        # as a repository secret (Settings -> Secrets -> Actions).
        # env:
        #   USE_LLM: "1"
        #   ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node fetch-content.mjs

      - name: Commit if changed
        run: |
          git config user.name "content-bot"
          git config user.email "bot@users.noreply.github.com"
          git add content.json
          git diff --staged --quiet || git commit -m "Update content ($(date -u +%FT%TZ))"
          git push
