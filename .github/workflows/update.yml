name: Update content

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Fetch content
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          # USE_LLM: "1"
          # ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node fetch-content.mjs
      - name: Commit if changed
        run: |
          git config user.name "content-bot"
          git config user.email "bot@users.noreply.github.com"
          git add content.json seen.json news-archive.json
          git diff --staged --quiet || git commit -m "Update content ($(date -u +%FT%TZ))"
          git push

